name: Daily Activity Log
on:
  schedule:
    - cron: "0 15 * * *" # 毎日15:00 UTC（日本時間で0:00）に実行
  workflow_dispatch:

permissions:
  contents: write # デフォルトではreadになっているので、書き込み権限を記載する

jobs:
  generate-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python .github/workflows/scripts/generate_log.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          HEALTH_GIST_ID: ${{ secrets.HEALTH_GIST_ID }}
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add activity_tracking/daily-logs/
          git diff --cached --quiet || git commit -m "📊 Daily log $(date +'%Y-%m-%d')"
          git push
